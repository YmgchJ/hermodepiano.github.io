<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermode Piano</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-color: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }
        
        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            z-index: 1;
        }

        .hero {
            margin-bottom: 60px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: var(--accent-gradient);
            border-radius: 24px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
            font-size: 40px;
            color: white;
            /* Placeholder for actual icon */
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 50px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .nav-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px 24px;
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 16px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        footer {
            margin-top: 80px;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 40px;
            }
            .app-icon {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            .nav-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero">
            <div class="app-icon">🎹</div>
            <h1>Hermode Piano</h1>
            <p class="subtitle">モバイルデバイスで究極の純正律を体験しよう。<br>Experience the ultimate pure intonation on your mobile device.</p>
        </div>

        <div class="nav-grid">
            <a href="manual/" class="nav-card">
                <div class="card-icon">📖</div>
                <div class="card-title">取扱説明書</div>
                <div class="card-desc">アプリの基本的な使い方や機能について確認できます。</div>
            </a>

            <a href="privacy/" class="nav-card">
                <div class="card-icon">🔒</div>
                <div class="card-title">プライバシーポリシー</div>
                <div class="card-desc">当アプリにおける情報の取り扱い方針について記載しています。</div>
            </a>

            <a href="contact/" class="nav-card">
                <div class="card-icon">✉️</div>
                <div class="card-title">お問い合わせ</div>
                <div class="card-desc">ご質問やご要望などがございましたらこちらからご連絡ください。</div>
            </a>
        </div>

        <footer>
            &copy; 2026 Sonotech. All rights reserved.
        </footer>
    </div>

</body>
</html>

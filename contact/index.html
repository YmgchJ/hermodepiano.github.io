<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Harmodus Piano</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0A84FF;
            --primary-hover: #0070E0;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #515154;
            --border-color: #E5E5EA;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-color);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .lang-toggle {
            display: inline-flex;
            background: var(--bg-color);
            padding: 4px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Span or Div that changes with language */
        .lang-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .lang-content.active {
            display: block;
        }

        /* For inline elements like spans inside buttons or links */
        span.lang-content.active {
            display: inline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        p.desc {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 15px;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
            background-color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button[type="submit"] {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(10, 132, 255, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="page-title">Contact Us</h1>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ja')" id="btn-ja">日本語</button>
                <button class="lang-btn active" onclick="setLang('en')" id="btn-en">English</button>
            </div>
            
            <div id="desc-en" class="lang-content active">
                <p class="desc">Please feel free to contact us using the form below if you have any questions or requests.</p>
            </div>
            <div id="desc-ja" class="lang-content">
                <p class="desc">ご質問やご要望がありましたら、以下のフォームよりお気軽にご連絡ください。</p>
            </div>
        </div>

        <!-- 
        NOTE:
        Please register for a free Formspree account (https://formspree.io/) 
        and replace 'YOUR_FORMSPREE_ID' with your actual form ID to receive emails.
        -->
        <form action="https://formspree.io/f/xlgyojyq" method="POST">
            <div class="form-group">
                <label for="name">
                    <span id="label-name-en" class="lang-content active">Name</span>
                    <span id="label-name-ja" class="lang-content">お名前</span>
                </label>
                <input type="text" id="name" name="name" required placeholder="Taro Yamada">
            </div>

            <div class="form-group">
                <label for="email">
                    <span id="label-email-en" class="lang-content active">Email</span>
                    <span id="label-email-ja" class="lang-content">メールアドレス</span>
                </label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="subject">
                    <span id="label-subject-en" class="lang-content active">Subject</span>
                    <span id="label-subject-ja" class="lang-content">件名</span>
                </label>
                <input type="text" id="subject" name="subject" required placeholder="Inquiry about Harmodus Piano">
            </div>

            <div class="form-group">
                <label for="message">
                    <span id="label-message-en" class="lang-content active">Message</span>
                    <span id="label-message-ja" class="lang-content">お問い合わせ内容</span>
                </label>
                <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
            </div>

            <button type="submit">
                <span id="btn-submit-en" class="lang-content active">Send Message</span>
                <span id="btn-submit-ja" class="lang-content">送信する</span>
            </button>
        </form>

        <a href="../privacy/" class="back-link">
            <span id="link-back-en" class="lang-content active">&larr; Back to Privacy Policy</span>
            <span id="link-back-ja" class="lang-content">&larr; プライバシーポリシーに戻る</span>
        </a>
    </div>

    <script>
        function setLang(lang) {
            // Update buttons
            document.getElementById('btn-ja').classList.remove('active');
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById('btn-' + lang).classList.add('active');

            // Toggle all translatable content
            const allEn = document.querySelectorAll('.lang-content[id$="-en"]');
            const allJa = document.querySelectorAll('.lang-content[id$="-ja"]');

            if (lang === 'en') {
                allJa.forEach(el => el.classList.remove('active'));
                allEn.forEach(el => el.classList.add('active'));
                
                document.getElementById('page-title').textContent = 'Contact Us';
                document.title = 'Contact - Harmodus Piano';
                document.documentElement.lang = 'en';

                // Update placeholders
                document.getElementById('subject').placeholder = 'Inquiry about Harmodus Piano';
                document.getElementById('message').placeholder = 'How can we help you?';
            } else {
                allEn.forEach(el => el.classList.remove('active'));
                allJa.forEach(el => el.classList.add('active'));

                document.getElementById('page-title').textContent = 'お問い合わせ';
                document.title = 'お問い合わせ - Harmodus Piano';
                document.documentElement.lang = 'ja';

                // Update placeholders
                document.getElementById('subject').placeholder = 'Harmodus Pianoに関するお問い合わせ';
                document.getElementById('message').placeholder = 'お問い合わせ内容をご記入ください';
            }
        }

        // Detect browser language on load
        window.onload = function() {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.startsWith('ja')) {
                setLang('ja');
            }
        };
    </script>
</body>
</html>

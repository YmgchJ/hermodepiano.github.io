<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Manual - Hermode Piano</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0A84FF;
            --primary-hover: #0070E0;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #515154;
            --border-color: #E5E5EA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-color);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        p.desc {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 25px;
        }

        .placeholder-box {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
            background-color: #FAFAFC;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .lang-toggle {
            display: inline-flex;
            background: var(--bg-color);
            padding: 4px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .lang-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .lang-content.active {
            display: block;
        }

        span.lang-content.active {
            display: inline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="page-title">User Manual</h1>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ja')" id="btn-ja">日本語</button>
                <button class="lang-btn active" onclick="setLang('en')" id="btn-en">English</button>
            </div>
            
            <p id="desc-en" class="desc lang-content active">How to use Hermode Piano.</p>
            <p id="desc-ja" class="desc lang-content">Hermode Pianoの使い方</p>
        </div>

        <div class="placeholder-box">
            <p id="placeholder-en" class="lang-content active">Please add the user manual content here.</p>
            <p id="placeholder-ja" class="lang-content">ここに取扱説明書の内容を追加してください。</p>
        </div>

        <a href="../" class="back-link">
            <span id="link-back-en" class="lang-content active">&larr; Back to Home</span>
            <span id="link-back-ja" class="lang-content">&larr; トップページに戻る</span>
        </a>
    </div>

    <script>
        function setLang(lang) {
            document.getElementById('btn-ja').classList.remove('active');
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById('btn-' + lang).classList.add('active');

            const allEn = document.querySelectorAll('.lang-content[id$="-en"]');
            const allJa = document.querySelectorAll('.lang-content[id$="-ja"]');

            if (lang === 'en') {
                allJa.forEach(el => el.classList.remove('active'));
                allEn.forEach(el => el.classList.add('active'));
                
                document.getElementById('page-title').textContent = 'User Manual';
                document.title = 'User Manual - Hermode Piano';
                document.documentElement.lang = 'en';
            } else {
                allEn.forEach(el => el.classList.remove('active'));
                allJa.forEach(el => el.classList.add('active'));

                document.getElementById('page-title').textContent = '取扱説明書';
                document.title = '取扱説明書 - Hermode Piano';
                document.documentElement.lang = 'ja';
            }
        }

        window.onload = function() {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.startsWith('ja')) {
                setLang('ja');
            }
        };
    </script>
</body>
</html>
